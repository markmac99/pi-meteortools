---
- hosts: radiopi
  vars_files: 
    - /mnt/c/Users/{{ lookup('env','USER' )}}/apikeys/mqvariables.enc
  vars:
    srcdir: "/mnt/c/Users/{{ lookup('env','USER' )}}/OneDrive/dev/meteorhunting/pi-meteortools/radio"
    destdir: ~/source/radiometeor_tackley
    
  tasks:
  - name: Copy files
    copy: src={{ item.src }} dest={{ item.dest }} mode={{ item.mode }}
    #delegate_to: localhost
    with_items:
    - {src: '{{srcdir}}/meteorradio.sh', dest: '{{destdir}}/', 'mode': '755', backup: no }
    - {src: '{{srcdir}}/monitorForNew.sh', dest: '{{destdir}}/', 'mode': '755', backup: no }
    - {src: '{{srcdir}}/meteorradio.service', dest: '{{destdir}}/', 'mode': '644', backup: no }
    - {src: '{{srcdir}}/config.ini', dest: '{{destdir}}/', 'mode': '644', backup: no }
    - {src: '{{srcdir}}/installservice.sh', dest: '{{destdir}}/', 'mode': '755', backup: no }
